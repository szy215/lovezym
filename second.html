<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>赵羽曼我喜欢你</title>
    <meta name="description" content="想对你说的话">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(to bottom, #0a0a1a 0%, #1a0a2e 50%, #0d0d1a 100%);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: relative;
        }
        
        /* 星空背景 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        
        /* 照片容器 */
        .photo-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 350px;
            height: 70vh;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(255, 182, 193, 0.3);
            opacity: 0;
            animation: fadeIn 1.5s ease-out 0.5s forwards;
        }
        
        .photo-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 3px solid rgba(255, 182, 193, 0.5);
            border-radius: 20px;
            z-index: 2;
            pointer-events: none;
        }
        
        .photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.8);
        }
        
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        
        /* 文字覆盖层 */
        .text-overlay {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 3;
            width: 90%;
        }
        
        .main-text {
            color: #ffb6c1;
            font-family: 'Courier New', monospace;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 182, 193, 0.8), 2px 2px 4px rgba(0, 0, 0, 0.8);
            letter-spacing: 3px;
            min-height: 30px;
        }
        
        .cursor {
            display: inline-block;
            width: 2px;
            height: 24px;
            background: #ffb6c1;
            animation: blink 1s infinite;
            vertical-align: middle;
            margin-left: 2px;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        
        /* 返回按钮 */
        .back-button {
            position: absolute;
            top: 30px;
            left: 30px;
            width: 45px;
            height: 45px;
            border: 2px solid rgba(255, 182, 193, 0.6);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(0, 0, 0, 0.3);
            z-index: 10;
            opacity: 0;
            animation: fadeIn 1s ease-out 2s forwards;
        }
        
        .back-button:hover {
            background: rgba(255, 182, 193, 0.2);
            border-color: #ffb6c1;
            transform: scale(1.1);
        }
        
        .back-button::before {
            content: '←';
            color: #ffb6c1;
            font-size: 20px;
        }
        
        /* 装饰心形 */
        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        .heart {
            position: absolute;
            color: rgba(255, 182, 193, 0.3);
            font-size: 20px;
            animation: float 4s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
            50% { transform: translateY(-20px) rotate(10deg); opacity: 0.6; }
        }
        
        /* 提示文字 */
        .hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 182, 193, 0.5);
            font-size: 12px;
            font-family: 'Courier New', monospace;
            opacity: 0;
            animation: fadeIn 1s ease-out 4s forwards;
        }
    </style>
</head>
<body>
    <!-- 星空背景 -->
    <div class="stars" id="stars"></div>
    
    <!-- 飘浮心形 -->
    <div class="floating-hearts" id="hearts"></div>
    
    <!-- 返回按钮 -->
    <div class="back-button" onclick="window.location.href='index.html'"></div>
    
    <!-- 照片容器 -->
    <div class="photo-container">
        <img src="assets/photo.jpg" alt="照片" class="photo" id="photo">
        <div class="text-overlay">
            <div class="main-text">
                <span id="typewriter"></span><span class="cursor"></span>
            </div>
        </div>
    </div>
    
    <!-- 提示 -->
    <div class="hint">点击返回 ←</div>
    
    <script>
        // 生成星空
        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 80; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 3 + 's';
                container.appendChild(star);
            }
        }
        createStars();
        
        // 生成飘浮心形
        function createHearts() {
            const container = document.getElementById('hearts');
            for (let i = 0; i < 15; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = '♥';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.top = Math.random() * 100 + '%';
                heart.style.fontSize = Math.random() * 15 + 10 + 'px';
                heart.style.animationDelay = Math.random() * 4 + 's';
                heart.style.animationDuration = Math.random() * 3 + 3 + 's';
                container.appendChild(heart);
            }
        }
        createHearts();
        
        // 打字机效果
        const text = "赵羽曼我喜欢你";
        const typewriterElement = document.getElementById('typewriter');
        let index = 0;
        
        function typeWriter() {
            if (index < text.length) {
                typewriterElement.innerHTML += text.charAt(index);
                index++;
                setTimeout(typeWriter, 200);
            }
        }
        
        // 延迟开始打字
        setTimeout(typeWriter, 1500);
        
        // 照片加载失败处理
        const photo = document.getElementById('photo');
        photo.onerror = function() {
            this.style.display = 'none';
            document.querySelector('.photo-container').style.background = 'linear-gradient(135deg, #1a0a2e 0%, #0d0d1a 100%)';
        };
    </script>
</body>
</html>
